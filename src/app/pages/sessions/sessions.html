<div class="min-h-screen bg-slate-150 p-6 space-y-6">
    <header class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
        <div class="ml-4">
            <h2 class="text-2xl font-bold text-light-text dark:text-dark-text">Sessions</h2>
            <p class="text-gray-600 dark:text-gray-400 mt-1">
                Manage and organize learning sessions
            </p>
        </div>

        <div class="relative">
            <fa-icon [icon]="faSearch" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm">
            </fa-icon>
            <input type="text" [formControl]="searchControl" placeholder="Search"
                class="w-80 rounded-lg border border-slate-300 bg-white pl-10 pr-4 py-2.5 text-sm text-slate-700 shadow-sm transition focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 focus:outline-none" />
        </div>

        <div class="flex items-center gap-3">
            @if(authUser.user.role === 'Super Admin'){
            <button (click)="addEditSession(undefined)"
                class="flex items-center gap-2 rounded-lg bg-[#003B73] px-5 py-2.5 text-sm font-semibold text-white shadow-md shadow-indigo-200 transition hover:bg-[#356fa6]">
                <fa-icon [icon]="faPlus"></fa-icon>
                Add New Session
            </button>
            }

        </div>
    </header>


    <router-outlet></router-outlet>


</div>
